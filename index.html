<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>hammercam 3.0</title>
  <style>
    :root {
      --fg: #f5f5f5;
      --border: rgba(255, 255, 255, 0.28);
      --muted: rgba(255, 255, 255, 0.7);
      --muted-light: rgba(255, 255, 255, 0.45);
      --neon: #c8ff00;
      --neon-dim: #b8eb00;
      --danger: #ff7b7b;
      --radius: 4px;
      --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
      --safe-t: max(14px, env(safe-area-inset-top, 0px));
      --safe-r: max(14px, env(safe-area-inset-right, 0px));
      --safe-b: max(14px, env(safe-area-inset-bottom, 0px));
      --safe-l: max(14px, env(safe-area-inset-left, 0px));
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 11px;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }

    #video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #view {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #111;
      display: none;
    }

    #view.mirrored { transform: scaleX(-1); }
    body.is-live #view { display: block; }

    .idle {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(320px, calc(100% - 40px));
      text-align: center;
      padding: 28px 22px;
      background: rgba(12, 12, 12, 0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    body.is-live .idle { display: none; }

    .idle h1 {
      font: 700 13px/1.2 var(--font-mono);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .idle p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 18px;
      font-size: 10px;
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      font: 700 11px/1 var(--font-mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.1);
      color: var(--fg);
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-primary {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
      width: 100%;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .btn-sm {
      min-height: 32px;
      padding: 0 10px;
      font-size: 10px;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-sm.primary {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    .hud {
      position: absolute;
      z-index: 10;
      display: none;
      gap: 8px;
      pointer-events: none;
    }

    body.is-live .hud { display: flex; }

    .hud > * { pointer-events: auto; }

    .hud-top {
      top: var(--safe-t);
      left: var(--safe-l);
      right: var(--safe-r);
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-bottom {
      bottom: var(--safe-b);
      left: var(--safe-l);
      right: var(--safe-r);
      justify-content: space-between;
      align-items: flex-end;
    }

    .hud-bottom-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hud-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(10, 10, 10, 0.55);
      color: var(--fg);
      font: 700 11px/1 var(--font-mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hud-btn.icon {
      width: 44px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .hud-btn.primary {
      background: color-mix(in srgb, var(--neon) 80%, transparent);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    body.controls-open #toggle-controls {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    .toast {
      position: absolute;
      z-index: 12;
      left: 50%;
      bottom: calc(var(--safe-b) + 58px);
      transform: translateX(-50%);
      max-width: min(90vw, 360px);
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .toast.error { color: var(--danger); }
    .toast:empty { display: none; }

    .overlay {
      position: absolute;
      z-index: 11;
      left: var(--safe-l);
      right: var(--safe-r);
      bottom: calc(var(--safe-b) + 58px);
      max-width: 440px;
      margin: 0 auto;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(10, 10, 10, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      gap: 11px;
      max-height: min(52dvh, 400px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    body.controls-open .overlay { display: flex; }

    .overlay-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rail {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-light);
    }

    .badge {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 8px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ctrl {
      display: grid;
      grid-template-columns: 5.4rem minmax(0, 1fr) 2.6rem;
      align-items: center;
      gap: 8px;
    }

    .ctrl label {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-light);
    }

    .ctrl output {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
    }

    .ctrl input[type="range"] {
      width: 100%;
      accent-color: var(--neon-dim);
      touch-action: none;
    }

    .ctrl select {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font: 10px/1.3 var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="video" playsinline webkit-playsinline muted autoplay></video>
    <canvas id="view" aria-label="dithered camera"></canvas>

    <div class="idle" id="idle">
      <h1>hammercam 3.0</h1>
      <p>Fullscreen Floyd–Steinberg camera. Start, then open Controls to tweak the look.</p>
      <button type="button" class="btn btn-primary" id="start-btn">Start camera</button>
    </div>

    <div class="hud hud-top" id="hud-top">
      <button type="button" class="hud-btn" id="flip-btn">Flip</button>
      <button type="button" class="hud-btn icon" id="stop-btn" aria-label="Stop">×</button>
    </div>

    <div class="hud hud-bottom" id="hud-bottom">
      <button type="button" class="hud-btn primary" id="snap-btn">Save</button>
      <div class="hud-bottom-right">
        <span class="badge" id="facing-badge">rear</span>
        <button type="button" class="hud-btn" id="toggle-controls">Controls</button>
      </div>
    </div>

    <div class="overlay" id="overlay" aria-hidden="true">
      <div class="overlay-head">
        <p class="rail">Output settings</p>
        <button type="button" class="btn btn-sm" id="hide-controls">Hide</button>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-sm" id="reset-btn">Reset</button>
        <button type="button" class="btn btn-sm primary" id="snap-btn-2">Snap png</button>
      </div>

      <div class="ctrl">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="default">Default</option>
          <option value="v1">V1 G00D</option>
          <option value="soft">Soft</option>
          <option value="hard">Hard</option>
          <option value="test4444">test4444</option>
        </select>
        <span></span>
      </div>
      <div class="ctrl">
        <label for="pixel">Pixel</label>
        <input type="range" id="pixel" min="0.2" max="3" step="0.01" value="0.75">
        <output id="pixel-val" for="pixel">0.75</output>
      </div>
      <div class="ctrl">
        <label for="threshold">Threshold</label>
        <input type="range" id="threshold" min="40" max="215" step="1" value="128">
        <output id="threshold-val" for="threshold">128</output>
      </div>
      <div class="ctrl">
        <label for="contrast">Contrast</label>
        <input type="range" id="contrast" min="0.5" max="3" step="0.05" value="1.2">
        <output id="contrast-val" for="contrast">1.20</output>
      </div>
      <div class="ctrl">
        <label for="strength">Strength</label>
        <input type="range" id="strength" min="0" max="2" step="0.05" value="1">
        <output id="strength-val" for="strength">1.00</output>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var presets = {
        default: { pixel: 0.75, threshold: 128, contrast: 1.2, strength: 1 },
        v1: { pixel: 0.35, threshold: 40, contrast: 2.25, strength: 0.65 },
        soft: { pixel: 1.25, threshold: 140, contrast: 0.9, strength: 0.75 },
        hard: { pixel: 0.9, threshold: 100, contrast: 2.0, strength: 1.25 },
        test4444: { pixel: 0.22, threshold: 44, contrast: 1.55, strength: 0.11 }
      };

      var video = document.getElementById('video');
      var view = document.getElementById('view');
      var toastEl = document.getElementById('toast');
      var overlay = document.getElementById('overlay');
      var facingBadge = document.getElementById('facing-badge');
      var startBtn = document.getElementById('start-btn');
      var stopBtn = document.getElementById('stop-btn');
      var flipBtn = document.getElementById('flip-btn');
      var snapBtn = document.getElementById('snap-btn');
      var snapBtn2 = document.getElementById('snap-btn-2');
      var resetBtn = document.getElementById('reset-btn');
      var toggleControlsBtn = document.getElementById('toggle-controls');
      var hideControlsBtn = document.getElementById('hide-controls');
      var presetEl = document.getElementById('preset');
      var pixelEl = document.getElementById('pixel');
      var thresholdEl = document.getElementById('threshold');
      var contrastEl = document.getElementById('contrast');
      var strengthEl = document.getElementById('strength');
      var pixelVal = document.getElementById('pixel-val');
      var thresholdVal = document.getElementById('threshold-val');
      var contrastVal = document.getElementById('contrast-val');
      var strengthVal = document.getElementById('strength-val');

      var work = document.createElement('canvas');
      var wctx = work.getContext('2d', { willReadFrequently: true });
      var vctx = view.getContext('2d');

      var stream = null;
      var facingMode = 'environment';
      var running = false;
      var starting = false;
      var raf = 0;

      function settings() {
        return {
          pixel: +pixelEl.value,
          threshold: +thresholdEl.value,
          contrast: +contrastEl.value,
          strength: +strengthEl.value
        };
      }

      function syncLabels() {
        var s = settings();
        pixelVal.textContent = s.pixel.toFixed(2);
        thresholdVal.textContent = String(s.threshold);
        contrastVal.textContent = s.contrast.toFixed(2);
        strengthVal.textContent = s.strength.toFixed(2);
      }

      function toast(msg, isError) {
        toastEl.textContent = msg || '';
        toastEl.classList.toggle('error', !!isError);
      }

      function applySettings(s) {
        pixelEl.value = s.pixel;
        thresholdEl.value = s.threshold;
        contrastEl.value = s.contrast;
        strengthEl.value = s.strength;
        syncLabels();
      }

      function setControlsOpen(open) {
        document.body.classList.toggle('controls-open', open);
        toggleControlsBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        overlay.setAttribute('aria-hidden', open ? 'false' : 'true');
      }

      function syncFacingUi() {
        var rear = facingMode === 'environment';
        facingBadge.textContent = rear ? 'rear' : 'front';
        view.classList.toggle('mirrored', !rear);
      }

      function setRunningUi(isOn) {
        document.body.classList.toggle('is-live', isOn);
        if (!isOn) setControlsOpen(false);
      }

      // Original Floyd–Steinberg (same as earlier hammercam / dith3r)
      function ditherImageOnCanvas(ctx, width, height, opts) {
        var threshold = opts.threshold;
        var contrast = opts.contrast;
        var strength = opts.strength;
        var imageData = ctx.getImageData(0, 0, width, height);
        var data = imageData.data;
        var mid = 128;
        var y, x, idx, oldPixel, newPixel, error;

        function distribute(dx, dy, factor, baseX, baseY) {
          var nx = baseX + dx;
          var ny = baseY + dy;
          if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
            var nidx = (ny * width + nx) * 4;
            var n = data[nidx] * 0.299 + data[nidx + 1] * 0.587 + data[nidx + 2] * 0.114 + error * factor;
            n = n < 0 ? 0 : n > 255 ? 255 : n;
            data[nidx] = data[nidx + 1] = data[nidx + 2] = n;
          }
        }

        for (y = 0; y < height; y++) {
          for (x = 0; x < width; x++) {
            idx = (y * width + x) * 4;
            oldPixel = data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114;
            oldPixel = (oldPixel - mid) * contrast + mid;
            oldPixel = oldPixel < 0 ? 0 : oldPixel > 255 ? 255 : oldPixel;
            newPixel = oldPixel < threshold ? 0 : 255;
            error = (oldPixel - newPixel) * strength;
            data[idx] = data[idx + 1] = data[idx + 2] = newPixel;

            distribute(1, 0, 7 / 16, x, y);
            distribute(-1, 1, 3 / 16, x, y);
            distribute(0, 1, 5 / 16, x, y);
            distribute(1, 1, 1 / 16, x, y);
          }
        }

        ctx.putImageData(imageData, 0, 0);
      }

      function processFrame() {
        if (!running || video.readyState < 2) return;

        try {
          var s = settings();
          var scale = Math.max(0.2, s.pixel);
          var vw = video.videoWidth || 640;
          var vh = video.videoHeight || 480;

          // Fine incremental pixels — original look
          var maxW = 520;
          var w = Math.min(maxW, Math.max(1, Math.round(vw / scale)));
          var h = Math.max(1, Math.round(vh * (w / vw)));

          if (work.width !== w || work.height !== h) {
            work.width = w;
            work.height = h;
          }

          var chunk = Math.max(1, Math.round(scale));
          var outW = w * chunk;
          var outH = h * chunk;
          if (view.width !== outW || view.height !== outH) {
            view.width = outW;
            view.height = outH;
          }

          wctx.imageSmoothingEnabled = false;
          wctx.drawImage(video, 0, 0, w, h);
          ditherImageOnCanvas(wctx, w, h, s);

          vctx.imageSmoothingEnabled = false;
          vctx.clearRect(0, 0, outW, outH);
          vctx.drawImage(work, 0, 0, outW, outH);
        } catch (err) {
          toast('Render error', true);
          console.error(err);
        }
      }

      function loop() {
        if (!running) return;
        processFrame();
        raf = requestAnimationFrame(loop);
      }

      function stopStreamOnly() {
        if (raf) {
          cancelAnimationFrame(raf);
          raf = 0;
        }
        if (stream) {
          stream.getTracks().forEach(function (t) { t.stop(); });
          stream = null;
        }
        video.srcObject = null;
      }

      function stopCamera() {
        running = false;
        starting = false;
        stopStreamOnly();
        setRunningUi(false);
        startBtn.disabled = false;
        startBtn.textContent = 'Start camera';
        toast('Stopped — tap Start camera');
      }

      async function getStream() {
        var attempts = [
          {
            audio: false,
            video: {
              facingMode: { ideal: facingMode },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          },
          {
            audio: false,
            video: { facingMode: facingMode }
          },
          {
            audio: false,
            video: true
          }
        ];

        var lastErr = null;
        for (var i = 0; i < attempts.length; i++) {
          try {
            return await navigator.mediaDevices.getUserMedia(attempts[i]);
          } catch (err) {
            lastErr = err;
          }
        }
        throw lastErr || new Error('getUserMedia failed');
      }

      async function startCamera() {
        if (starting) return;

        if (!window.isSecureContext && location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          toast('Camera needs HTTPS or localhost (not plain Wi‑Fi http / file).', true);
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          toast('Camera API unavailable in this browser.', true);
          return;
        }

        starting = true;
        startBtn.disabled = true;
        startBtn.textContent = 'Starting…';
        toast('Requesting camera…');

        try {
          // Keep canvas up during flip reclaim
          var wasLive = running;
          running = false;
          stopStreamOnly();

          stream = await getStream();
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          video.muted = true;

          await video.play();

          // Wait briefly for dimensions
          if (!video.videoWidth) {
            await new Promise(function (resolve) {
              var done = function () {
                video.removeEventListener('loadeddata', done);
                resolve();
              };
              video.addEventListener('loadeddata', done);
              setTimeout(resolve, 800);
            });
          }

          running = true;
          starting = false;
          syncFacingUi();
          setRunningUi(true);
          startBtn.textContent = 'Start camera';
          toast('Live · ' + (facingMode === 'environment' ? 'rear' : 'front') + ' · Controls for settings');
          loop();

          if (!wasLive) setControlsOpen(false);
        } catch (err) {
          starting = false;
          running = false;
          stopStreamOnly();
          setRunningUi(false);
          startBtn.disabled = false;
          startBtn.textContent = 'Start camera';
          var name = err && err.name ? err.name : '';
          if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
            toast('Camera permission denied. Allow camera in Safari settings.', true);
          } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
            toast('No camera found on this device.', true);
          } else {
            toast('Could not start camera. Use HTTPS and allow permission.', true);
          }
          console.error(err);
        }
      }

      async function flipCamera() {
        if (!running || starting) return;
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        syncFacingUi();
        toast('Switching to ' + (facingMode === 'environment' ? 'rear' : 'front') + '…');
        await startCamera();
      }

      function downloadPng(url, filename) {
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function canvasToBlob(canvas) {
        return new Promise(function (resolve, reject) {
          if (!canvas.toBlob) {
            try {
              var data = canvas.toDataURL('image/png');
              var bin = atob(data.split(',')[1]);
              var arr = new Uint8Array(bin.length);
              for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
              resolve(new Blob([arr], { type: 'image/png' }));
            } catch (e) {
              reject(e);
            }
            return;
          }
          canvas.toBlob(function (blob) {
            if (blob) resolve(blob);
            else reject(new Error('encode failed'));
          }, 'image/png');
        });
      }

      async function snap() {
        if (!running || !view.width) {
          toast('Nothing to save yet');
          return;
        }

        var filename = 'hammercam-' + Date.now() + '.png';

        try {
          var blob = await canvasToBlob(view);
          var file = new File([blob], filename, { type: 'image/png' });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ files: [file], title: 'hammercam' });
              toast('Shared — Save Image for Photos');
              return;
            } catch (shareErr) {
              if (shareErr && shareErr.name === 'AbortError') {
                toast('Save cancelled');
                return;
              }
            }
          }

          var url = URL.createObjectURL(blob);
          downloadPng(url, filename);
          setTimeout(function () { URL.revokeObjectURL(url); }, 2500);
          toast('Saved ' + filename);
        } catch (err) {
          downloadPng(view.toDataURL('image/png'), filename);
          toast('Saved ' + filename);
        }
      }

      [pixelEl, thresholdEl, contrastEl, strengthEl].forEach(function (el) {
        el.addEventListener('input', syncLabels);
      });

      presetEl.addEventListener('change', function () {
        var key = presetEl.value;
        if (key && presets[key]) applySettings(presets[key]);
      });

      startBtn.addEventListener('click', function (e) {
        e.preventDefault();
        startCamera();
      });
      stopBtn.addEventListener('click', function (e) {
        e.preventDefault();
        stopCamera();
      });
      flipBtn.addEventListener('click', function (e) {
        e.preventDefault();
        flipCamera();
      });
      snapBtn.addEventListener('click', function (e) {
        e.preventDefault();
        snap();
      });
      snapBtn2.addEventListener('click', function (e) {
        e.preventDefault();
        snap();
      });
      toggleControlsBtn.addEventListener('click', function (e) {
        e.preventDefault();
        setControlsOpen(!document.body.classList.contains('controls-open'));
      });
      hideControlsBtn.addEventListener('click', function (e) {
        e.preventDefault();
        setControlsOpen(false);
      });
      resetBtn.addEventListener('click', function (e) {
        e.preventDefault();
        presetEl.value = 'default';
        applySettings(presets.default);
        toast('Reset to default');
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (document.body.classList.contains('controls-open')) setControlsOpen(false);
          else if (running) stopCamera();
        }
      });

      applySettings(presets.default);
      presetEl.value = 'default';
      setRunningUi(false);
      setControlsOpen(false);
      toast('Fullscreen ready — tap Start camera');
    })();
  </script>
</body>
</html>
